<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christmas and New Year Countdown - Saint Joseph The Worker Parish</title>
    <link rel="stylesheet" href="christmas.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="SJP logo solo.png" type="image/x-icon">

</head>


<body>

    <audio src="Bibingka.mp3" autoplay loop></audio>
    <div class="image-logo">
        <img src="SJP Logo.png" alt="">
    </div>

    <div class="container">

        <div class="countdown">
            <h1 id="heading-top">ONLY</h1>

            <div class="time" id="countdown">

                <div class="text-time-box">
                    <div id="days" class="time-box"> </div>
                    <h1>Days</h1>
                </div>

                <div class="text-time-box">
                    <div id="hours" class="time-box"></div>
                    <h1>Hours</h1>
                </div>
                <div class="text-time-box">
                    <div id="minutes" class="time-box"></div>
                    <h1>Minutes</h1>
                </div>
                <div class="text-time-box">
                    <div id="seconds" class="time-box"></div>
                    <h1>Seconds</h1>
                </div>
            </div>

            <h1 id="heading-bottom">UNTIL NEW YEAR</h1> <!-- updated by script.js -->
        </div>
    </div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-left">
                <img src="SJP Logo.png" alt="SJP Logo" class="footer-logo">
                <div class="footer-text">
                    <strong>Saint Joseph The Worker Parish</strong>
                    <div>Montevista -Dioces of Tagum &copy; 2026</div>
                </div>
            </div>
            <div class="footer-right">
                <div>Connect with us</div>

                <div class="footer-social">
                    <a href="https://www.facebook.com/profile.php?id=61566973296247" class="footer-link"
                        aria-label="Facebook">
                        <svg class="footer-icon" width="20" height="20" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path
                                d="M22 12C22 6.477 17.523 2 12 2S2 6.477 2 12c0 5 3.657 9.128 8.438 9.879v-6.99H7.898v-2.889h2.54V9.845c0-2.507 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562v1.875h2.773l-.443 2.889h-2.33v6.99C18.343 21.128 22 17 22 12z"
                                fill="#ffd700" />
                        </svg>
                        <span class="footer-link-label">Facebook</span>
                    </a>

                    <a href="sjwpmonte1982@gmail.com" class="footer-link" aria-label="Email">
                        <svg class="footer-icon" width="20" height="20" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path
                                d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"
                                fill="#ffd700" />
                        </svg>
                        <span class="footer-link-label">Email</span>
                    </a>
                </div>

            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
